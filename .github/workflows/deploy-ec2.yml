# Tự deploy EC2 sau mỗi push lên main (cần cấu hình Secrets — xem docs/deployment/ec2-cicd.md).
name: Deploy EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT != '' && secrets.EC2_SSH_PORT || '22' }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_PATH || '/home/ubuntu/utc-elibrary' }}"
            export COMPOSE_PARALLEL_LIMIT=1
            export EC2_DEPLOY_SKIP_GIT=0
            bash scripts/ec2-deploy.sh
