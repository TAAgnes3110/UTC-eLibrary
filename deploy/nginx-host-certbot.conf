# Nginx trên EC2 (host) — proxy vào Docker + Certbot
# 1) .env: APP_PORT=8080
# 2) Sửa server_name bên dưới thành domain thật của bạn
# 3) sudo cp deploy/nginx-host-certbot.conf /etc/nginx/sites-available/utc-elibrary
# 4) sudo ln -s /etc/nginx/sites-available/utc-elibrary /etc/nginx/sites-enabled/
# 5) sudo nginx -t && sudo systemctl reload nginx
# 6) sudo certbot --nginx -d <your-domain> [-d <api-subdomain>]
# 7) .env: SESSION_SECURE_COOKIE=true rồi recreate container

server {
    listen 80;
    listen [::]:80;
    server_name <your-domain> <api-subdomain>;

    client_max_body_size 64M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
