# EC2 t3.micro — build nhẹ (vendor + Vite build trên host trước)
# Xem: README.md — mục Deploy EC2

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.ec2
    image: utc-elibrary-app:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    env_file:
      - .env
    environment:
      DEPLOY_PROFILE: vps
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - utc-elibrary

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.ec2
    image: utc-elibrary-app:latest
    pull_policy: never
    restart: unless-stopped
    command: php artisan schedule:work
    env_file:
      - .env
    environment:
      DEPLOY_PROFILE: vps
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - utc-elibrary

  # Xử lý queue (preview PDF, mail…) khi DIGITAL_PREVIEW_DISPATCH_SYNC=false
  queue:
    build:
      context: .
      dockerfile: Dockerfile.ec2
    image: utc-elibrary-app:latest
    pull_policy: never
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - .env
    environment:
      DEPLOY_PROFILE: vps
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - utc-elibrary

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-utc_elibrary}"
      MYSQL_USER: "${DB_USERNAME:-utc}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - utc-elibrary

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - utc-elibrary

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_bootstrap_cache:

networks:
  utc-elibrary:
    driver: bridge
