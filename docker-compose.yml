# UTC-eLibrary - Docker Compose (app + MySQL + Redis)
# Usage: docker compose up -d && docker compose exec app php artisan migrate --force

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: utc-elibrary-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=elibrary
      - DB_USERNAME=elibrary
      - DB_PASSWORD=secret
      - CACHE_STORE=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=database
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - elibrary

  mysql:
    image: mysql:8.0
    container_name: utc-elibrary-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: elibrary
      MYSQL_USER: elibrary
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - elibrary

  redis:
    image: redis:7-alpine
    container_name: utc-elibrary-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - elibrary

volumes:
  mysql_data:
  redis_data:

networks:
  elibrary:
    driver: bridge
